<!DOCTYPE html>
<html>
<head>
  <title>Formulir Pendaftaran Praktikan</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #f7971e, #ffd200);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .form-box {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 30px 25px;
      border-radius: 12px;
      box-shadow: 0px 8px 24px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 20px;
      color: #333;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 14px;
      font-weight: bold;
      color: #444;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="email"]:focus,
    select:focus,
    textarea:focus {
      border-color: #f7971e;
    }

    .radio, .checkbox {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .radio label-inline,
    .checkbox label-inline {
      font-weight: normal;
    }

    .radio div, .checkbox div {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
    }

    .button-group {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    .submit {
      background: #28a745;
      color: white;
    }

    .cancel {
      background: #dc3545;
      color: white;
    }

    .nim {
      font-size: 13px;
      color: gray;
      margin-top: 4px;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>

  <div class="form-box">

    <h2>Formulir Pendaftaran Praktikan</h2>

    <form>

      <label>Nama</label>
      <input type="text" placeholder="Masukkan Nama">

      <div class="nim">
        NIM : [NIM KAMU]
      </div>

      <label>Username</label>
      <input type="text" placeholder="Masukkan Username">

      <label>Password</label>
      <input type="password">

      <label>Email</label>
      <input type="email" placeholder="Input Email">

      <label>Jenis Kelamin</label>
      <div class="radio">
        <div><input type="radio" name="jk"> Pria</div>
        <div><input type="radio" name="jk"> Wanita</div>
      </div>

      <label>Hobi</label>
      <div class="checkbox">
        <div><input type="checkbox"> Renang</div>
        <div><input type="checkbox"> Bersepeda</div>
        <div><input type="checkbox"> Memancing</div>
      </div>

      <label>Jenjang Pendidikan</label>
      <select>
        <option>Pilih</option>
        <option>Tamat D3</option>
        <option>Tamat S1</option>
        <option>Tamat S2</option>
        <option>Tamat S3</option>
      </select>

      <label>Kritik &amp; Saran</label>
      <textarea rows="4"></textarea>

      <div class="button-group">
        <button type="reset" class="cancel">Cancel</button>
        <button type="submit" class="submit">Submit</button>
      </div>

    </form>

  </div>

</body>
</html>
